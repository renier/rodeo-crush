---
# Rodeo Crush Team Configuration (project override example)
# This file uses the new dynamic roles format.
# Prompt text can be inline (prompt:) or loaded from a file (prompt_file:).

roles:
  - name: Architect
    count: 1
    assignee: "architect"
    prompt_file: prompts/architect.md
    send_prompt_once: true
    filter:
      assignee: "architect"
      status: open

  - name: Developer
    count: 2
    assignee: "developer"
    prompt_file: prompts/developer.md
    filter:
      assignee: "developer"
      ready: true
    worktree: true

  - name: Reviewer
    count: 1
    assignee: "reviewer"
    prompt_file: prompts/reviewer.md
    filter:
      assignee: "reviewer"
      status: in_progress

  - name: Tester
    count: 1
    assignee: "tester"
    prompt_file: prompts/tester.md
    filter:
      assignee: "tester"
      status: in_progress
    worktree: true
